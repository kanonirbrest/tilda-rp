# Blueprint Render: Web Service (Docker) + PostgreSQL.
# New → Blueprint → репозиторий с корнем в каталоге приложения (рядом с Dockerfile).
# Веб и БД в Frankfurt — приватная сеть Render.
# Планы free — для тестов; для продакшена с bePaid см. README (усыпление веба, лимиты БД).

databases:
  - name: dei-tickets-db
    databaseName: dei_tickets
    user: dei
    region: frankfurt
    plan: free

services:
  - type: web
    name: dei-tickets
    runtime: docker
    region: frankfurt
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dei-tickets-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DEV_SKIP_PAYMENT
        value: "false"
      # Необязательно: если задать — перекроет автоматический URL *.onrender.com в ссылках/QR.
      - key: APP_BASE_URL
        sync: false
      - key: BEPAID_SHOP_ID
        sync: false
      - key: BEPAID_SECRET_KEY
        sync: false
      # Не подставляйте старый …/beyag/payments (404). Пусть приложение использует дефолт checkout.bepaid.by
      # - key: BEPAID_API_URL
      #   value: https://checkout.bepaid.by/ctp/api/checkouts
      # true — в запрос Beyag добавляется test: true (документация bePaid / тестовые карты)
      - key: BEPAID_TEST
        value: "false"
      # Почта с билетом (Gmail: smtp.gmail.com, порт 587, пароль приложения). Без SMTP — только лог в консоль.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # POST /api/orders с Тильды (origin через запятую)
      # - key: PUBLIC_ORDERS_CORS_ORIGIN
      #   sync: false
      # Админка /admin: задайте вручную в Dashboard
      # - key: ADMIN_API_SECRET
      #   sync: false
      # - key: ADMIN_CORS_ORIGIN
      #   sync: false
