# Статическая админка из admin-ui → GitHub Pages (Project site: https://user.github.io/<repo>/).
# В настройках репозитория: Pages → Source: GitHub Actions.
name: Deploy admin UI to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "admin-ui/**"
      - ".github/workflows/deploy-admin-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-admin
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Без cache: npm — иначе setup-node падает, если lockfile не найден по пути (разные корни репо и т.п.)
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
        working-directory: admin-ui
      - name: Build
        run: npm run build
        working-directory: admin-ui
        env:
          # Project page: ассеты по пути /<имя-репоз>/ ; для user site (username.github.io) замените на /
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Опционально в Settings → Secrets and variables → Actions:
          # VITE_API_BASE — URL Render; VITE_ADMIN_TOKEN — тот же, что на сервере (попадёт в JS!)
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_ADMIN_TOKEN: ${{ secrets.VITE_ADMIN_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: admin-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
